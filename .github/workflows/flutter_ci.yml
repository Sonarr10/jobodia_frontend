name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          JOB_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          COMMIT_AUTHOR: ${{ github.actor }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured; skipping notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_TEXT="✅ Frontend CI passed"
          else
            STATUS_TEXT="❌ Frontend CI failed"
          fi

          AUTHOR_VALUE="$COMMIT_AUTHOR"

          if [ -n "$PR_AUTHOR" ]; then
            AUTHOR_VALUE="$PR_AUTHOR"
          fi

          if [ -z "$PR_AUTHOR" ] && [[ "$COMMIT_MESSAGE" =~ Merge\ pull\ request\ \#([0-9]+) ]]; then
            PR_NUMBER="${BASH_REMATCH[1]}"
            MERGED_PR_AUTHOR=$(curl -sS \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
              | jq -r '.user.login // empty')

            if [ -n "$MERGED_PR_AUTHOR" ]; then
              AUTHOR_VALUE="$MERGED_PR_AUTHOR"
            fi
          fi

          MESSAGE=$(printf '%s\n\nRepository: %s\nBranch: %s\nCommit: %s\nMessage: %s\nAuther By: @%s' \
            "$STATUS_TEXT" \
            "$GITHUB_REPOSITORY" \
            "$BRANCH_NAME" \
            "${COMMIT_SHA:0:7}" \
            "$COMMIT_MESSAGE" \
            "$AUTHOR_VALUE")

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            ${TELEGRAM_TOPIC_ID:+-d message_thread_id="${TELEGRAM_TOPIC_ID}"} \
            -d text="${MESSAGE}"
